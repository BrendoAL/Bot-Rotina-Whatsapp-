name: whatsapp-bot CI

on:
  push:
    paths:
      - 'whatsapp-bot/**'
  pull_request:
    paths:
      - 'whatsapp-bot/**'

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependências
        working-directory: whatsapp-bot
        run: npm install

      - name: Rodar testes
        working-directory: whatsapp-bot
        run: npm test

      - name: Build da imagem Docker
        working-directory: whatsapp-bot
        run: docker build -t lambda-app/whatsapp-bot:${{ github.sha }} .
