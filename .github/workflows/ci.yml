name: CI — Full Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  user-service:
    name: user-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Permissão gradlew
        working-directory: user-service
        run: chmod +x gradlew
      - name: Testes
        working-directory: user-service
        run: ./gradlew test --no-daemon
      - name: Relatório
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: user-service-report
          path: user-service/build/reports/tests/test/
          retention-days: 7
      - name: Docker build
        working-directory: user-service
        run: |
          ./gradlew bootJar --no-daemon -x test
          docker build -t lambda-app/user-service:${{ github.sha }} .

  activity-service:
    name: activity-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Permissão gradlew
        working-directory: activity-service
        run: chmod +x gradlew
      - name: Testes
        working-directory: activity-service
        run: ./gradlew test --no-daemon
      - name: Relatório
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: activity-service-report
          path: activity-service/build/reports/tests/test/
          retention-days: 7
      - name: Docker build
        working-directory: activity-service
        run: |
          ./gradlew bootJar --no-daemon -x test
          docker build -t lambda-app/activity-service:${{ github.sha }} .

  whatsapp-bot:
    name: whatsapp-bot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Instalar dependências
        working-directory: whatsapp-bot
        run: npm install
      - name: Testes
        working-directory: whatsapp-bot
        run: npm test
      - name: Docker build
        working-directory: whatsapp-bot
        run: docker build -t lambda-app/whatsapp-bot:${{ github.sha }} .

  all-green:
    name: All services passed
    runs-on: ubuntu-latest
    needs: [user-service, activity-service, whatsapp-bot]
    steps:
      - name: Pipeline completo
        run: echo "✅ Todos os serviços buildaram e testaram com sucesso"
