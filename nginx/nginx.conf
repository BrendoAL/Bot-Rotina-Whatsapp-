events {
    worker_connections 1024;
}

http {
    upstream user-service    { server user-service:8081; }
    upstream activity-service { server activity-service:8082; }
    upstream whatsapp-bot    { server whatsapp-bot:3000; }

    server {
        listen 80;

        # User Service
        location /api/users {
            proxy_pass http://user-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Activity Service
        location /api/activities {
            proxy_pass http://activity-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/goals {
            proxy_pass http://activity-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WhatsApp Bot Webhook
        location /bot {
            proxy_pass http://whatsapp-bot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}