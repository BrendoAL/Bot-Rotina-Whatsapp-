services:

  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d:z
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: lambda-secret-key
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      QRCODE_LIMIT: 30
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: mysql
      DATABASE_CONNECTION_URI: mysql://root:root@mysql:3306/evolution_db?createDatabaseIfNotExist=true&charset=utf8mb4&ssl=false
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - app-network

  user-service:
    build: ./user-service
    container_name: user-service
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/users_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    networks:
      - app-network

  activity-service:
    build: ./activity-service
    container_name: activity-service
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/activity_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      USER_SERVICE_URL: http://user-service:8081
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    networks:
      - app-network

  whatsapp-bot:
    build: ./whatsapp-bot
    container_name: whatsapp-bot
    restart: always
    depends_on:
      - rabbitmq
      - evolution-api
    environment:
      PORT: 3000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: lambda-secret-key
      EVOLUTION_INSTANCE: prod-bot
      USER_SERVICE_URL: http://user-service:8081
      ACTIVITY_SERVICE_URL: http://activity-service:8082
    ports:
      - "3000:3000"
    networks:
      - app-network

  notification-worker:
    build: ./notification-worker
    container_name: notification-worker
    restart: always
    depends_on:
      - rabbitmq
      - evolution-api
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: lambda-secret-key
      EVOLUTION_INSTANCE: prod-bot
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - activity-service
      - whatsapp-bot
    networks:
      - app-network

